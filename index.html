/* ============================ DATA MODEL ============================
 Entry shape (normalized, what the app actually edits):
   { id, kind:'expense'|'income', category, person, name, monthly:[12 numbers] }
 Budgets: { [category]: number }  (monthly budget per category)
 Meta: { saldoInicial: number }
==================================================================== */

function seedToState(SEED) {
  const entries = [];
  SEED.despesas.forEach((cat) => {
    cat.items.forEach((it) => {
      entries.push({
        id: uid(),
        kind: "expense",
        category: cat.category,
        person: it.person,
        name: it.name,
        monthly: it.monthly.slice(0, 12),
      });
    });
  });
  Object.keys(SEED.renda).forEach((person) => {
    SEED.renda[person].forEach((it) => {
      entries.push({
        id: uid(),
        kind: "income",
        category: "Renda",
        person,
        name: it.name,
        monthly: it.monthly.slice(0, 12),
      });
    });
  });
  const budgets = {};
  SEED.despesas.forEach((c) => (budgets[c.category] = c.budget));
  return { entries, budgets, saldoInicial: SEED.saldoInicial || 0 };
}

const CATEGORIES = [
  "Moradia","Educação","Mercado","Alimentação","Empregada doméstica","Vestuário",
  "Saúde","Transporte","Cuidados pessoais","Previdência e Investimentos","Viagens","Outros",
];

  if (!hasSupabase) return null;
  return await loadRemote();
}
async function saveState(state) {
  if (!hasSupabase) return false;
  return await saveRemote(state);
}

/* ----------------------- computation helpers ----------------------- */
function useComputed(entries, budgets, saldoInicial) {
  return useMemo(() => {
    const byMonth = MONTHS.map((_, m) => {
      let income = 0, expense = 0;
      const catExpense = {};
      const personIncome = { Fernando: 0, Helen: 0 };
      const personExpense = { Fernando: 0, Helen: 0 };
      CATEGORIES.forEach((c) => (catExpense[c] = 0));
      entries.forEach((e) => {
        const v = e.monthly[m] || 0;
        if (e.kind === "income") {
          income += v;
          if (personIncome[e.person] != null) personIncome[e.person] += v;
        } else {
          expense += v;
          catExpense[e.category] = (catExpense[e.category] || 0) + v;
          if (personExpense[e.person] != null) personExpense[e.person] += v;
        }
      });
      return { income, expense, net: income - expense, catExpense, personIncome, personExpense };
    });
    // running balance
    let run = saldoInicial;
    const balance = byMonth.map((mo) => (run += mo.net));
    const year = byMonth.reduce(
      (a, mo) => ({ income: a.income + mo.income, expense: a.expense + mo.expense }),
      { income: 0, expense: 0 }
    );
    const budgetYear = CATEGORIES.reduce((a, c) => a + (budgets[c] || 0) * 12, 0);
    return { byMonth, balance, year, budgetYear };
  }, [entries, budgets, saldoInicial]);
}

function Ring({ pct, size = 56, stroke = 7, color }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const clamped = Math.max(0, Math.min(1, pct));
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.line} strokeWidth={stroke} />
      <circle
        cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color}
        strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - clamped)}
        style={{ transition: "stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)" }}
      />
    </svg>
  );
}

function Pill({ children, tone = "neutral" }) {
  const map = {
    good: { bg: C.greenSoft, fg: C.green },
    bad: { bg: C.redSoft, fg: C.red },
    warn: { bg: C.orangeSoft, fg: C.orange },
    neutral: { bg: C.petrolSoft, fg: C.petrol },
  }[tone];
  return (
    <span style={{
      background: map.bg, color: map.fg, fontSize: 11, fontWeight: 600,
      padding: "3px 9px", borderRadius: 999, display: "inline-flex",
      alignItems: "center", gap: 4, whiteSpace: "nowrap",
    }}>{children}</span>
  );
}

function Card({ children, style, accent }) {
  return (
    <div style={{
      background: C.bg, border: `1px solid ${C.line}`, borderRadius: 16,
      padding: 16, position: "relative", overflow: "hidden",
      boxShadow: "0 1px 2px rgba(10,40,42,.04)", ...style,
    }}>
      {accent && (
        <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 4, background: accent }} />
      )}
      {children}
    </div>
  );
}

function MiniBars({ data, color, height = 40 }) {
  const max = Math.max(...data.map((d) => Math.abs(d)), 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 3, height }}>
      {data.map((d, i) => (
        <div key={i} style={{
          flex: 1, height: `${Math.max(4, (Math.abs(d) / max) * height)}px`,
          background: d < 0 ? C.red : color, borderRadius: 3, opacity: 0.85,
          transition: "height .4s ease",
        }} title={`${MONTHS[i]}: ${fmt(d)}`} />
      ))}
    </div>
  );
}

/* ============================ DASHBOARD ============================ */

  const healthy = mo.net >= 0;
  const savingsRate = mo.income > 0 ? mo.net / mo.income : 0;

  const catRows = CATEGORIES.map((c) => {
    const spent = mo.catExpense[c] || 0;
    const budget = budgets[c] || 0;
    const pct = budget > 0 ? spent / budget : 0;
    return { c, spent, budget, pct, over: budget > 0 && spent > budget };
  }).sort((a, b) => b.spent - a.spent);

  const netSeries = comp.byMonth.map((m) => m.net);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Hero balance */}
      <Card accent={healthy ? C.green : C.red} style={{ padding: 18 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <div>
            <div style={{ fontSize: 12, color: C.sub, fontWeight: 600, letterSpacing: .3 }}>
              SALDO ACUMULADO · {MONTHS_FULL[month]}
            </div>
            <div style={{ fontSize: 30, fontWeight: 700, fontFamily: "Sora", color: bal < 0 ? C.red : C.ink, marginTop: 4 }}>
              {fmt(bal)}
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center" }}>
            <Ring pct={Math.abs(savingsRate)} color={healthy ? C.green : C.red} size={58} />
            <div style={{ fontSize: 10, color: C.sub, marginTop: 4, fontWeight: 600 }}>
              {(savingsRate * 100).toFixed(0)}% poupado
            </div>
          </div>
        </div>
        <div style={{ display: "flex", gap: 18, marginTop: 14 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 600 }}>Entradas</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: C.green, display: "flex", alignItems: "center", gap: 4 }}>
              <ArrowUpRight size={15} /> {fmtShort(mo.income)}
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 600 }}>Saídas</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: C.red, display: "flex", alignItems: "center", gap: 4 }}>
              <ArrowDownRight size={15} /> {fmtShort(mo.expense)}
            </div>
          </div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 600 }}>Resultado</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: healthy ? C.green : C.red }}>
              {mo.net >= 0 ? "+" : ""}{fmtShort(mo.net)}
            </div>
          </div>
        </div>
      </Card>

      {/* Net trend */}
      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <div style={{ fontWeight: 600, fontFamily: "Sora", fontSize: 14, color: C.ink }}>
            Resultado mensal no ano
          </div>
          <Pill tone={comp.year.income - comp.year.expense >= 0 ? "good" : "bad"}>
            {comp.year.income - comp.year.expense >= 0 ? <TrendingUp size={12} /> : <TrendingDown size={12} />}
            {fmtShort(comp.year.income - comp.year.expense)} no ano
          </Pill>

                  {over && <AlertTriangle size={13} color={C.red} />}
                </div>
                <div style={{ height: 6, background: C.line, borderRadius: 99, overflow: "hidden" }}>
                  <div style={{ width: `${Math.min(100, pct * 100)}%`, height: "100%", background: tone, borderRadius: 99, transition: "width .5s ease" }} />
                </div>
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

/* ============================ LANÇAMENTOS ============================ */
function Entries({ entries, budgets, month, setEditing, setEntries, persistNow }) {
  const [filterPerson, setFilterPerson] = useState("Todos");
  const [filterKind, setFilterKind] = useState("Tudo"); // Tudo | Despesas | Entradas
  const [search, setSearch] = useState("");

  const setMonthValue = useCallback((id, value) => {
    setEntries((prev) => {
      const next = prev.map((e) =>
        e.id === id ? { ...e, monthly: e.monthly.map((v, i) => (i === month ? value : v)) } : e
      );
      persistNow(next);
      return next;
    });
  }, [month, setEntries, persistNow]);

  const del = useCallback((id) => {
    setEntries((prev) => {
      const next = prev.filter((e) => e.id !== id);
      persistNow(next);
      return next;
    });
  }, [setEntries, persistNow]);

  const groups = useMemo(() => {
    const filtered = entries.filter((e) => {
      if (filterPerson !== "Todos" && e.person !== filterPerson) return false;
      if (filterKind === "Despesas" && e.kind !== "expense") return false;
      if (filterKind === "Entradas" && e.kind !== "income") return false;
      if (search && !e.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
    const order = filterKind === "Entradas" ? ["Renda"] : [...CATEGORIES, "Renda"];
    return order
      .map((cat) => ({
        cat,
        items: filtered.filter((e) => e.category === cat),
      }))
      .filter((g) => g.items.length);
  }, [entries, filterPerson, filterKind, search]);

  const seg = (val, set, opts) => (
    <div style={{ display: "flex", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: 3, gap: 2 }}>
      {opts.map((o) => (
        <button key={o} onClick={() => set(o)} style={{
          border: "none", background: val === o ? C.petrol : "transparent",
          color: val === o ? "#fff" : C.sub, fontSize: 12, fontWeight: 600,
          padding: "6px 10px", borderRadius: 8, cursor: "pointer", transition: ".15s",
        }}>{o}</button>
      ))}
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", gap: 8, alignItems: "center", background: C.bg, border: `1px solid ${C.line}`, borderRadius: 12, padding: "8px 12px" }}>
        <Search size={16} color={C.sub} />
        <input
          value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="Buscar lançamento..."
          style={{ border: "none", outline: "none", fontSize: 14, flex: 1, color: C.ink, background: "transparent", fontFamily: "Inter" }}
        />
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {seg(filterKind, setFilterKind, ["Tudo", "Despesas", "Entradas"])}
        {seg(filterPerson, setFilterPerson, ["Todos", "Fernando", "Helen"])}
      </div>

      {groups.map(({ cat, items }) => {
        const Icon = cat === "Renda" ? Wallet : (CAT_ICON[cat] || Package);
        const isIncome = cat === "Renda";
        const total = items.reduce((a, e) => a + (e.monthly[month] || 0), 0);
        return (
          <Card key={cat} style={{ padding: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px", borderBottom: `1px solid ${C.line}` }}>
              <div style={{ width: 30, height: 30, borderRadius: 9, background: isIncome ? C.greenSoft : C.petrolSoft, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <Icon size={16} color={isIncome ? C.green : C.petrol} />
              </div>
              <span style={{ fontWeight: 600, fontFamily: "Sora", fontSize: 14, color: C.ink, flex: 1 }}>{cat}</span>
              <span style={{ fontWeight: 700, fontSize: 14, color: isIncome ? C.green : C.ink }}>{fmtShort(total)}</span>
            </div>
            <div>
              {items.map((e, idx) => (
                <EntryRow key={e.id} e={e} month={month} last={idx === items.length - 1}
                  onChange={(v) => setMonthValue(e.id, v)}
                  onEdit={() => setEditing(e)} onDelete={() => del(e.id)} />
              ))}
            </div>
          </Card>
        );
      })}
      {!groups.length && (
        <div style={{ textAlign: "center", padding: 40, color: C.sub, fontSize: 14 }}>
          Nenhum lançamento encontrado.
        </div>
      )}
    </div>
  );
}

function EntryRow({ e, month, last, onChange, onEdit, onDelete }) {
  const [val, setVal] = useState(String(e.monthly[month] ?? 0));
  const [focus, setFocus] = useState(false);
  useEffect(() => { if (!focus) setVal(String(e.monthly[month] ?? 0)); }, [e, month, focus]);

  const commit = () => {
    const num = parseFloat(val.replace(/\./g, "").replace(",", ".")) || 0;
    onChange(num);
    setFocus(false);
  };
  const isIncome = e.kind === "income";

  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderBottom: last ? "none" : `1px solid ${C.line}` }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, color: C.ink, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.name}</div>
        <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>{e.person}</div>
      </div>
      <div style={{
        display: "flex", alignItems: "center",
        border: `1px solid ${focus ? C.petrol : C.line}`, borderRadius: 9,
        padding: "5px 9px", background: focus ? C.petrolSoft : C.panel, transition: ".15s",
      }}>
        <span style={{ fontSize: 12, color: C.sub, marginRight: 3 }}>R$</span>
        <input
          inputMode="decimal" value={val}
          onFocus={(ev) => { setFocus(true); ev.target.select(); }}
          onChange={(ev) => setVal(ev.target.value)}
          onBlur={commit}
          onKeyDown={(ev) => ev.key === "Enter" && ev.target.blur()}
          style={{
            border: "none", outline: "none", width: 74, textAlign: "right",
            fontSize: 14, fontWeight: 600, color: isIncome ? C.green : C.ink,
            background: "transparent", fontFamily: "Inter",
          }}
        />
      </div>
      <button onClick={onEdit} style={iconBtn}><Pencil size={14} color={C.sub} /></button>
      <button onClick={onDelete} style={iconBtn}><Trash2 size={14} color={C.red} /></button>
    </div>
  );
}
const iconBtn = { border: "none", background: "transparent", cursor: "pointer", padding: 5, borderRadius: 7, display: "flex" };

/* ============================ MODAL ADD/EDIT ============================ */
function EntryModal({ editing, month, onClose, onSave, existingNames }) {
  const isNew = editing === "new";
  const base = isNew
    ? { id: null, kind: "expense", category: "Moradia", person: "Fernando", name: "", monthly: Array(12).fill(0) }
    : editing;
  const [kind, setKind] = useState(base.kind);
  const [category, setCategory] = useState(base.category === "Renda" ? "Moradia" : base.category);
  const [person, setPerson] = useState(base.person);
  const [name, setName] = useState(base.name);
  const [amount, setAmount] = useState(String(base.monthly[month] ?? 0));
  const [recur, setRecur] = useState(false); // apply to all remaining months
  const [nameMode, setNameMode] = useState(isNew ? "pick" : "type");

  const suggestions = useMemo(() => {
    const cat = kind === "income" ? "Renda" : category;
    return [...new Set(existingNames.filter((n) => n.cat === cat).map((n) => n.name))].slice(0, 12);
  }, [existingNames, kind, category]);

  const save = () => {
    const num = parseFloat(amount.replace(/\./g, "").replace(",", ".")) || 0;
    const monthly = [...base.monthly];
    if (recur) { for (let i = month; i < 12; i++) monthly[i] = num; }
    else monthly[month] = num;
    onSave({
      id: base.id || uid(),
      kind,
      category: kind === "income" ? "Renda" : category,
      person, name: name.trim() || "Sem nome", monthly,
    });
  };

  const chip = (active) => ({
    border: `1px solid ${active ? C.petrol : C.line}`,
    background: active ? C.petrol : C.bg, color: active ? "#fff" : C.ink,
    padding: "9px 12px", borderRadius: 10, fontSize: 13, fontWeight: 600,
    cursor: "pointer", transition: ".15s", display: "flex", alignItems: "center", gap: 6,
  });

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(9,40,42,.35)", backdropFilter: "blur(3px)",
      display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: C.bg, width: "100%", maxWidth: 480, borderRadius: "22px 22px 0 0",
        padding: 20, maxHeight: "92vh", overflowY: "auto",
        animation: "slideUp .28s cubic-bezier(.2,.8,.2,1)",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
          <div style={{ fontWeight: 700, fontFamily: "Sora", fontSize: 18, color: C.ink }}>
            {isNew ? "Novo lançamento" : "Editar lançamento"}
          </div>
          <button onClick={onClose} style={iconBtn}><X size={20} color={C.sub} /></button>
        </div>

        <Label>Tipo</Label>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <button onClick={() => setKind("expense")} style={chip(kind === "expense")}>
            <ArrowDownRight size={15} /> Despesa
          </button>
          <button onClick={() => setKind("income")} style={chip(kind === "income")}>
            <ArrowUpRight size={15} /> Entrada
          </button>
        </div>

        {kind === "expense" && (
          <>
            <Label>Categoria</Label>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 14 }}>
              {CATEGORIES.map((c) => {
                const Icon = CAT_ICON[c] || Package;
                const a = category === c;
                return (
                  <button key={c} onClick={() => setCategory(c)} style={{ ...chip(a), padding: "8px 10px", fontSize: 12 }}>
                    <Icon size={13} /> {c}
                  </button>
                );
              })}
            </div>
          </>
        )}

        <Label>Quem</Label>
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          {PEOPLE.map((p) => (
            <button key={p} onClick={() => setPerson(p)} style={chip(person === p)}>{p}</button>
          ))}
        </div>

        <Label>Descrição</Label>
        {isNew && suggestions.length > 0 && (
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            <button onClick={() => setNameMode("pick")} style={{ ...chip(nameMode === "pick"), padding: "5px 10px", fontSize: 12 }}>Escolher existente</button>
            <button onClick={() => { setNameMode("type"); setName(""); }} style={{ ...chip(nameMode === "type"), padding: "5px 10px", fontSize: 12 }}>Nova</button>
          </div>
        )}
        {nameMode === "pick" && suggestions.length > 0 ? (
          <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 14 }}>
            {suggestions.map((s) => (
              <button key={s} onClick={() => setName(s)} style={{ ...chip(name === s), padding: "8px 11px", fontSize: 12 }}>{s}</button>
            ))}
          </div>
        ) : (
          <input
            value={name} onChange={(e) => setName(e.target.value)}
            placeholder="Ex.: Mercado, Farmácia, Salário..."
            style={inputStyle}
          />
        )}

        <Label>Valor · {MONTHS_FULL[month]}</Label>
        <div style={{ display: "flex", alignItems: "center", border: `1.5px solid ${C.petrol}`, borderRadius: 12, padding: "12px 14px", marginBottom: 12 }}>
          <span style={{ fontSize: 18, color: C.sub, marginRight: 6 }}>R$</span>
          <input
            inputMode="decimal" autoFocus={!isNew} value={amount}
            onChange={(e) => setAmount(e.target.value)}
            onFocus={(e) => e.target.select()}
            placeholder="0,00"
            style={{ border: "none", outline: "none", fontSize: 24, fontWeight: 700, color: C.ink, flex: 1, fontFamily: "Sora", background: "transparent" }}
          />
        </div>

        <label style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 18, cursor: "pointer" }}>
          <div onClick={() => setRecur(!recur)} style={{
            width: 44, height: 26, borderRadius: 99, background: recur ? C.green : C.line,
            position: "relative", transition: ".2s", flexShrink: 0,
          }}>
            <div style={{ position: "absolute", top: 3, left: recur ? 21 : 3, width: 20, height: 20, borderRadius: 99, background: "#fff", transition: ".2s", boxShadow: "0 1px 3px rgba(0,0,0,.2)" }} />
          </div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>Repetir nos próximos meses</div>
            <div style={{ fontSize: 11, color: C.sub }}>Aplica de {MONTHS[month]} até Dez</div>
          </div>
        </label>

        <button onClick={save} style={{
          width: "100%", border: "none", background: C.petrol, color: "#fff",
          padding: 15, borderRadius: 13, fontSize: 15, fontWeight: 700, fontFamily: "Sora",
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>
          <Check size={18} /> {isNew ? "Adicionar" : "Salvar"}
        </button>
      </div>
    </div>
  );
}

          Ponto de partida para o saldo acumulado.
        </div>
        <div style={{ display: "flex", alignItems: "center", border: `1px solid ${C.line}`, borderRadius: 11, padding: "10px 13px" }}>
          <span style={{ fontSize: 16, color: C.sub, marginRight: 6 }}>R$</span>
          <input
            inputMode="decimal" defaultValue={saldoInicial}
            onBlur={(e) => setSaldoInicial(parseFloat(e.target.value.replace(/\./g, "").replace(",", ".")) || 0)}
            style={{ border: "none", outline: "none", fontSize: 18, fontWeight: 700, fontFamily: "Sora", color: C.ink, flex: 1, background: "transparent" }}
          />
        </div>
      </Card>

      <Card>
        <div style={{ fontWeight: 600, fontFamily: "Sora", fontSize: 14, color: C.ink, marginBottom: 4 }}>
          Orçamento mensal por categoria
        </div>
        <div style={{ fontSize: 12, color: C.sub, marginBottom: 12 }}>
          Define a meta mensal usada nas barras de Orçado vs. Real.
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
          {CATEGORIES.map((c) => {
            const Icon = CAT_ICON[c] || Package;
            return (
              <div key={c} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <div style={{ width: 28, height: 28, borderRadius: 8, background: C.petrolSoft, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  <Icon size={14} color={C.petrol} />
                </div>
                <span style={{ fontSize: 13, color: C.ink, flex: 1 }}>{c}</span>
                <div style={{ display: "flex", alignItems: "center", border: `1px solid ${C.line}`, borderRadius: 9, padding: "5px 9px", background: C.panel }}>
                  <span style={{ fontSize: 12, color: C.sub, marginRight: 3 }}>R$</span>
                  <input
                    inputMode="decimal" defaultValue={budgets[c] || 0}
                    onBlur={(e) => {
                      const v = parseFloat(e.target.value.replace(/\./g, "").replace(",", ".")) || 0;
                      setBudgets((p) => ({ ...p, [c]: v }));
                    }}
                    style={{ border: "none", outline: "none", width: 72, textAlign: "right", fontSize: 14, fontWeight: 600, color: C.ink, background: "transparent" }}
                  />
                </div>
              </div>
            );
          })}
          <div style={{ display: "flex", justifyContent: "space-between", paddingTop: 10, marginTop: 4, borderTop: `1px solid ${C.line}` }}>
            <span style={{ fontSize: 13, fontWeight: 700, color: C.ink }}>Total / ano</span>
            <span style={{ fontSize: 14, fontWeight: 700, color: C.petrol }}>{fmt(comp.budgetYear)}</span>
          </div>
        </div>
      </Card>

      <Card accent={C.petrol}>
        <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
          <Cloud size={20} color={C.petrol} style={{ flexShrink: 0, marginTop: 2 }} />
          <div>
            <div style={{ fontWeight: 600, fontSize: 13, color: C.ink, marginBottom: 4 }}>Sobre a sincronização</div>
            <div style={{ fontSize: 12, color: C.sub, lineHeight: 1.5 }}>
              Os dados ficam guardados num armazenamento compartilhado: abrindo o app no mesmo ambiente, os dois celulares veem os mesmos lançamentos. Para sincronização dedicada em nuvem (Firebase/Supabase) entre aparelhos distintos, o código já está preparado para receber as credenciais.
            </div>
          </div>
        </div>
      </Card>

      <Card>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: 13, color: C.ink }}>Restaurar dados de 2026</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>Volta aos valores da planilha original.</div>
          </div>
          {!confirmReset ? (
            <button onClick={() => setConfirmReset(true)} style={{ border: `1px solid ${C.line}`, background: C.bg, borderRadius: 9, padding: "8px 12px", fontSize: 13, fontWeight: 600, color: C.sub, cursor: "pointer" }}>
              Restaurar
            </button>
          ) : (
            <div style={{ display: "flex", gap: 6 }}>
              <button onClick={() => { onReset(); setConfirmReset(false); }} style={{ border: "none", background: C.red, color: "#fff", borderRadius: 9, padding: "8px 12px", fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Confirmar</button>
              <button onClick={() => setConfirmReset(false)} style={{ border: `1px solid ${C.line}`, background: C.bg, borderRadius: 9, padding: "8px 10px", fontSize: 13, color: C.sub, cursor: "pointer" }}>Cancelar</button>
            </div>
          )}
        </div>
      </Card>
    </div>
  );
}

/* ============================ APP SHELL ============================ */
function App() {
  const [state, setState] = useState(null); // {entries, budgets, saldoInicial}
  const [entries, setEntries] = useState([]);
  const [budgets, setBudgets] = useState({});
  const [saldoInicial, setSaldoInicial] = useState(0);
  const [month, setMonth] = useState(0);
  const [tab, setTab] = useState("dash"); // dash | entries | settings
  const [editing, setEditing] = useState(null); // null | "new" | entry
  const [sync, setSync] = useState("loading"); // loading | ok | local | saving
  const [loaded, setLoaded] = useState(false);

  // initial load
  useEffect(() => {
    (async () => {
      const stored = await loadState();
      if (stored && stored.entries) {
        setEntries(stored.entries);
        setBudgets(stored.budgets);
        setSaldoInicial(stored.saldoInicial || 0);
        setSync(hasSupabase ? "ok" : "local");
      } else {
        const seeded = seedToState(SEED);
        setEntries(seeded.entries);
        setBudgets(seeded.budgets);
        setSaldoInicial(seeded.saldoInicial);
        if (hasSupabase) { await saveState(seeded); setSync("ok"); }
        else setSync("local");
      }
      setLoaded(true);
    })();
  }, []);

  // Realtime: quando o outro celular salva, atualiza este aqui.
  useEffect(() => {
    if (!hasSupabase) return;
    const unsub = subscribeRemote((payload) => {
      if (!payload || !payload.entries) return;
      setEntries(payload.entries);
      setBudgets(payload.budgets);
      setSaldoInicial(payload.saldoInicial || 0);
      setSync("ok");
    });
    return unsub;
  }, []);

  const persistNow = useCallback(async (overrideEntries) => {
    if (!hasSupabase) return;
    setSync("saving");
    const ok = await saveState({
      entries: overrideEntries || entries, budgets, saldoInicial,
    });
    setSync(ok ? "ok" : "local");
  }, [entries, budgets, saldoInicial]);

  // persist when budgets/saldo change (after load)
  useEffect(() => {
    if (!loaded) return;
    persistNow();
    // eslint-disable-next-line
  }, [budgets, saldoInicial]);

  const comp = useComputed(entries, budgets, saldoInicial);

  const existingNames = useMemo(
    () => entries.map((e) => ({ cat: e.category, name: e.name })), [entries]
  );

  const saveEntry = (entry) => {
    setEntries((prev) => {
      const exists = prev.some((e) => e.id === entry.id);
      const next = exists ? prev.map((e) => (e.id === entry.id ? entry : e)) : [...prev, entry];
      persistNow(next);
      return next;
    });
    setEditing(null);
  };

  if (!hasSupabase) {
    return (
      <div style={{ ...root, padding: 24, display: "flex", flexDirection: "column", gap: 14, justifyContent: "center", minHeight: "100vh" }}>
        <style>{FONT_IMPORT}</style>
        <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 20, color: C.petrol }}>
          Quase lá
        </div>
        <div style={{ fontSize: 14, color: C.sub, lineHeight: 1.6 }}>
          O app está pronto, mas ainda falta conectar o banco de dados na nuvem
          (Supabase) para sincronizar os dois celulares. Abra o arquivo
          <b> index.html</b>, preencha <b> SUPABASE_URL </b> e
          <b> SUPABASE_ANON_KEY </b> no bloco <b> CONFIG </b> lá no início, e
          recarregue.
        </div>
        <div style={{ fontSize: 13, color: C.sub }}>
          O passo a passo completo está no arquivo <b>LEIA-ME.md</b> do projeto.
        </div>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div style={{ ...root, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 400 }}>
        <style>{`${FONT_IMPORT} @keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <RefreshCw size={28} color={C.petrol} style={{ animation: "spin 1s linear infinite" }} />
      </div>
    );
  }

  const syncBadge = {
    loading: { icon: <RefreshCw size={13} />, text: "Carregando", tone: "neutral" },
    saving: { icon: <RefreshCw size={13} style={{ animation: "spin 1s linear infinite" }} />, text: "Salvando", tone: "warn" },
    ok: { icon: <Cloud size={13} />, text: "Sincronizado", tone: "good" },
    local: { icon: <CloudOff size={13} />, text: "Local", tone: "warn" },
  }[sync];

  return (
    <div style={root}>
      <style>{`
        ${FONT_IMPORT}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        *{font-family:'Inter',-apple-system,sans-serif;box-sizing:border-box}
        ::-webkit-scrollbar{width:0;height:0}
      `}</style>

      {/* Header */}
      <div style={{ padding: "16px 16px 12px", background: C.bg, borderBottom: `1px solid ${C.line}`, position: "sticky", top: 0, zIndex: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 19, color: C.petrol, lineHeight: 1 }}>
              Nosso Orçamento
            </div>
            <div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>Fernando & Helen · 2026</div>
          </div>
          <Pill tone={syncBadge.tone}>{syncBadge.icon} {syncBadge.text}</Pill>
        </div>

        {/* Month selector */}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => setMonth((m) => Math.max(0, m - 1))} disabled={month === 0} style={navArrow(month === 0)}>
            <ChevronLeft size={18} color={month === 0 ? C.line : C.petrol} />
          </button>
          <div style={{ flex: 1, overflowX: "auto", display: "flex", gap: 6, padding: "2px 0" }}>
            {MONTHS.map((m, i) => (
              <button key={m} onClick={() => setMonth(i)} style={{
                border: "none", borderRadius: 9, padding: "7px 13px", flexShrink: 0,
                background: i === month ? C.petrol : C.panel, color: i === month ? "#fff" : C.sub,
                fontSize: 13, fontWeight: 600, cursor: "pointer", transition: ".15s",
              }}>{m}</button>
            ))}
          </div>
          <button onClick={() => setMonth((m) => Math.min(11, m + 1))} disabled={month === 11} style={navArrow(month === 11)}>
            <ChevronRight size={18} color={month === 11 ? C.line : C.petrol} />
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{ padding: 16, paddingBottom: 96 }}>
        {tab === "dash" && <Dashboard comp={comp} month={month} budgets={budgets} />}
        {tab === "entries" && (
          <Entries entries={entries} budgets={budgets} month={month}
            setEditing={setEditing} setEntries={setEntries} persistNow={persistNow} />
        )}
        {tab === "settings" && (
          <SettingsView budgets={budgets} setBudgets={setBudgets}
            saldoInicial={saldoInicial} setSaldoInicial={setSaldoInicial}
            comp={comp} onReset={async () => {
              const s = seedToState(SEED);
              setEntries(s.entries); setBudgets(s.budgets); setSaldoInicial(s.saldoInicial);
              await saveState(s); setSync(hasSupabase ? "ok" : "local");
            }} />
        )}
      </div>

      {/* FAB */}
      {tab !== "settings" && (
        <button onClick={() => setEditing("new")} style={{
          position: "fixed", bottom: 80, right: 18, width: 58, height: 58, borderRadius: 18,
          background: C.orange, border: "none", color: "#fff", cursor: "pointer",
          boxShadow: "0 6px 18px rgba(232,115,42,.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 30,
        }}>
          <Plus size={28} strokeWidth={2.5} />
        </button>
      )}

      {/* Bottom nav */}
      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 480, margin: "0 auto",
        background: C.bg, borderTop: `1px solid ${C.line}`, display: "flex",
        padding: "8px 0 calc(8px + env(safe-area-inset-bottom))", zIndex: 25,
      }}>
        {[
          { id: "dash", icon: LayoutDashboard, label: "Painel" },
          { id: "entries", icon: ListPlus, label: "Lançamentos" },
          { id: "settings", icon: Settings2, label: "Ajustes" },
        ].map(({ id, icon: Icon, label }) => (
          <button key={id} onClick={() => setTab(id)} style={{
            flex: 1, border: "none", background: "transparent", cursor: "pointer",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            color: tab === id ? C.petrol : C.sub,
          }}>
            <Icon size={22} strokeWidth={tab === id ? 2.4 : 2} />
            <span style={{ fontSize: 10.5, fontWeight: 600 }}>{label}</span>
          </button>
        ))}
      </div>

      {editing && (
        <EntryModal editing={editing} month={month} existingNames={existingNames}
          onClose={() => setEditing(null)} onSave={saveEntry} />
      )}
    </div>
  );
}

const root = {
  maxWidth: 480, margin: "0 auto", background: C.bg, minHeight: "100vh",
  color: C.ink, position: "relative",
};
const navArrow = (dis) => ({
  border: `1px solid ${C.line}`, background: C.bg, borderRadius: 9, width: 32, height: 32,
  display: "flex", alignItems: "center", justifyContent: "center", cursor: dis ? "default" : "pointer", flexShrink: 0,
});


const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(App));

  </script>
</body>
</html>
