// ---- Supabase client + data layer (cross-device sync) ----
// Sanitiza o que foi colado no CONFIG: remove espaços e barra final da URL,
// que são as causas mais comuns de "invalid path specified in request url".
const _SB_URL = String(CONFIG.SUPABASE_URL || "").trim().replace(/\/+$/, "");
const _SB_KEY = String(CONFIG.SUPABASE_ANON_KEY || "").trim();

const _configured =
  _SB_URL &&
  _SB_KEY &&
  !_SB_URL.includes("COLE_AQUI") &&
  !_SB_KEY.includes("COLE_AQUI");

const _sbLib = window.supabase || window.Supabase;
const _sb = _configured
  ? _sbLib.createClient(_SB_URL, _SB_KEY)
  : null;
const hasSupabase = !!_sb;
const ROW_ID = "casa";

async function loadRemote() {
  if (!_sb) return null;
  const { data, error } = await _sb.from("orcamento").select("payload").eq("id", ROW_ID).maybeSingle();
  if (error) { console.error(error.message); return null; }
  return data ? data.payload : null;
}
let LAST_SYNC_ERROR = "";
async function saveRemote(payload) {
  if (!_sb) return false;
  try {
    const { error } = await _sb.from("orcamento").upsert({ id: ROW_ID, payload, updated_at: new Date().toISOString() });
    if (error) { LAST_SYNC_ERROR = error.message || String(error); console.error("saveRemote:", error); return false; }
    LAST_SYNC_ERROR = "";
    return true;
  } catch (err) {
    LAST_SYNC_ERROR = (err && err.message) || String(err);
    console.error("saveRemote exception:", err);
    return false;
  }
}
function subscribeRemote(onChange) {
  if (!_sb) return () => {};
  const ch = _sb.channel("orcamento-sync").on(
    "postgres_changes",
    { event: "*", schema: "public", table: "orcamento", filter: `id=eq.${ROW_ID}` },
    (p) => { if (p.new && p.new.payload) onChange(p.new.payload); }
  ).subscribe();
  return () => _sb.removeChannel(ch);
}

  const v = Number(n) || 0;

// Normaliza o orçamento de uma categoria para um array de 12 meses.
// Aceita: array de 12 (novo formato), número (formato antigo -> mesmo valor em todos os meses), ou nada.
const budgetArr = (b) => {
  if (Array.isArray(b)) {
    const a = b.slice(0, 12);
    while (a.length < 12) a.push(0);
    return a.map((v) => Number(v) || 0);
  }
  const n = Number(b) || 0;
  return Array(12).fill(n);
};

/* ============================ DATA MODEL ============================
 Entry shape (normalized, what the app actually edits):
   { id, kind:'expense'|'income', category, person, name, monthly:[12 numbers] }
 Budgets: { [category]: number }  (monthly budget per category)
 Meta: { saldoInicial: number }
==================================================================== */

function seedToState(SEED) {
  const entries = [];
  // marca como pago/recebido os meses já decorridos (jan-mai, índices 0-4)
  // apenas onde o item tem valor diferente de zero
  const seedPaid = (monthly) => {
    const paid = {};
    for (let i = 0; i <= 4; i++) if (monthly[i] && monthly[i] !== 0) paid[i] = true;
    return paid;
  };
  SEED.despesas.forEach((cat) => {
    cat.items.forEach((it) => {
      const monthly = it.monthly.slice(0, 12);
      entries.push({
        id: uid(),
        kind: "expense",
        category: cat.category,
        person: it.person,
        name: it.name,
        monthly,
        paid: seedPaid(monthly),
      });
    });
  });
  Object.keys(SEED.renda).forEach((person) => {
    SEED.renda[person].forEach((it) => {
      const monthly = it.monthly.slice(0, 12);
      entries.push({
        id: uid(),
        kind: "income",
        category: "Renda",
        person,
        name: it.name,
        monthly,
        paid: seedPaid(monthly),
      });
    });
  });
  const budgets = {};
  SEED.despesas.forEach((c) => (budgets[c.category] = budgetArr(c.budgetMonthly || c.budget)));
  return { entries, budgets, saldoInicial: SEED.saldoInicial || 0 };
}

// Exporta os dados lançados para um arquivo .xlsx (abas Despesas e Renda + Resumo).
function exportToXlsx(entries, budgets) {
  if (typeof XLSX === "undefined") {
    alert("Não foi possível carregar o gerador de Excel. Verifique a conexão e tente de novo.");
    return;
  }
  const head = ["Categoria", "Pessoa", "Descrição", ...MONTHS, "Total"];
  const rowOf = (e) => {
    const tot = e.monthly.reduce((a, b) => a + (b || 0), 0);
    return [e.category, e.person, e.name, ...e.monthly.map((v) => v || 0), tot];
  };

  // --- Aba Despesas (agrupada por categoria, com subtotal) ---
  const desp = entries.filter((e) => e.kind === "expense");
  const dRows = [head];
  CATEGORIES.forEach((cat) => {
    const items = desp.filter((e) => e.category === cat);
    if (!items.length) return;
    items.forEach((e) => dRows.push(rowOf(e)));
    // subtotal da categoria
    const sub = MONTHS.map((_, i) => items.reduce((a, e) => a + (e.monthly[i] || 0), 0));
    dRows.push(["", "", "Subtotal " + cat, ...sub, sub.reduce((a, b) => a + b, 0)]);
    dRows.push([]); // linha em branco
  });

  // --- Aba Renda ---
  const rend = entries.filter((e) => e.kind === "income");
  const rRows = [head];
  ["Fernando", "Helen"].forEach((p) => {
    const items = rend.filter((e) => e.person === p);
    if (!items.length) return;
    items.forEach((e) => rRows.push(rowOf(e)));
    const sub = MONTHS.map((_, i) => items.reduce((a, e) => a + (e.monthly[i] || 0), 0));
    rRows.push(["", "", "Subtotal " + p, ...sub, sub.reduce((a, b) => a + b, 0)]);
    rRows.push([]);
  });

  // --- Aba Resumo (Renda, Despesa, Saldo do mês e acumulado) ---
  const sumMonth = (arr, i) => arr.reduce((a, e) => a + (e.monthly[i] || 0), 0);
  const resHead = ["", ...MONTHS, "Total"];
  const rRenda = ["Renda", ...MONTHS.map((_, i) => sumMonth(rend, i))];
  rRenda.push(rRenda.slice(1).reduce((a, b) => a + b, 0));
  const rDesp = ["Despesa", ...MONTHS.map((_, i) => sumMonth(desp, i))];
  rDesp.push(rDesp.slice(1).reduce((a, b) => a + b, 0));
  const rNet = ["Saldo do mês", ...MONTHS.map((_, i) => sumMonth(rend, i) - sumMonth(desp, i))];
  rNet.push(rNet.slice(1).reduce((a, b) => a + b, 0));
  let run = 0;
  const rAcc = ["Saldo acumulado", ...MONTHS.map((_, i) => (run += sumMonth(rend, i) - sumMonth(desp, i)))];
  rAcc.push("");
  const resumoRows = [resHead, rRenda, rDesp, rNet, rAcc];

  // --- Aba Orçamento (mensal por categoria) ---
  const orcHead = ["Categoria", ...MONTHS, "Total / ano"];
  const orcRows = [orcHead];
  CATEGORIES.forEach((c) => {
    const arr = budgetArr(budgets[c]);
    orcRows.push([c, ...arr, arr.reduce((a, b) => a + b, 0)]);
  });

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(resumoRows), "Resumo");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dRows), "Despesas");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rRows), "Renda");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(orcRows), "Orçamento");
  XLSX.writeFile(wb, "Nosso_Orcamento_2026.xlsx");
}

const CATEGORIES = [
  "Moradia","Educação","Mercado","Alimentação","Empregada doméstica","Vestuário",
  "Saúde","Transporte","Cuidados pessoais","Previdência e Investimentos","Viagens","Outros",
];

/* ----------------------- computation helpers ----------------------- */
function useComputed(entries, budgets, saldoInicial, personView = "Casal") {
  return useMemo(() => {
    const inView = (e) => personView === "Casal" || e.person === personView;
    const byMonth = MONTHS.map((_, m) => {
      let income = 0, expense = 0;
      const catExpense = {};
      const personIncome = { Fernando: 0, Helen: 0 };
      const personExpense = { Fernando: 0, Helen: 0 };
      CATEGORIES.forEach((c) => (catExpense[c] = 0));
      entries.forEach((e) => {
        if (!inView(e)) return;
        const v = e.monthly[m] || 0;
        if (e.kind === "income") {
          income += v;
          if (personIncome[e.person] != null) personIncome[e.person] += v;
        } else {
          expense += v;
          catExpense[e.category] = (catExpense[e.category] || 0) + v;
          if (personExpense[e.person] != null) personExpense[e.person] += v;
        }
      });
      return { income, expense, net: income - expense, catExpense, personIncome, personExpense };
    });
    // running balance (parte do saldo inicial só na visão do Casal)
    let run = personView === "Casal" ? saldoInicial : 0;
    const balance = byMonth.map((mo) => (run += mo.net));

    // Saldo ACUMULADO por pessoa: entradas + sobra dos meses anteriores − gastos.
    // Carrega mês a mês. (Saldo inicial conta apenas na visão do Casal; por pessoa
    // partimos de 0, pois a planilha não separa saldo inicial por pessoa.)
    const runPerson = { Fernando: 0, Helen: 0 };
    const personBalance = byMonth.map((mo) => {
      runPerson.Fernando += mo.personIncome.Fernando - mo.personExpense.Fernando;
      runPerson.Helen += mo.personIncome.Helen - mo.personExpense.Helen;
      return { Fernando: runPerson.Fernando, Helen: runPerson.Helen };
    });

    const year = byMonth.reduce(
      (a, mo) => ({ income: a.income + mo.income, expense: a.expense + mo.expense }),
      { income: 0, expense: 0 }
    );
    // Orçamento: na visão individual não há meta por pessoa, então usamos o total
    // só na visão do Casal; nas individuais o "orçado" fica oculto.
    const budgetYear = CATEGORIES.reduce((a, c) => a + budgetArr(budgets[c]).reduce((x, y) => x + y, 0), 0);
    return { byMonth, balance, personBalance, year, budgetYear, personView };
  }, [entries, budgets, saldoInicial, personView]);
}

function Ring({ pct, size = 56, stroke = 7, color }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const clamped = Math.max(0, Math.min(1, pct));
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke={C.line} strokeWidth={stroke} />
      <circle
        cx={size / 2} cy={size / 2} r={r} fill="none" stroke={color}
        strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={c} strokeDashoffset={c * (1 - clamped)}
        style={{ transition: "stroke-dashoffset .6s cubic-bezier(.4,0,.2,1)" }}
      />
    </svg>
  );
}

function MiniBars({ data, color, height = 40 }) {

}

// Gráfico de linha multi-série (SVG puro). series: [{name, color, data:[12]}]
function LineChart({ series, highlight, height = 170 }) {
  const W = 320, H = height, padL = 8, padR = 8, padT = 12, padB = 22;
  const n = 12;
  const allVals = series.flatMap((s) => s.data);
  let min = Math.min(0, ...allVals);
  let max = Math.max(0, ...allVals);
  if (min === max) max = min + 1;
  const pad = (max - min) * 0.08;
  min -= pad; max += pad;
  const x = (i) => padL + (i * (W - padL - padR)) / (n - 1);
  const y = (v) => padT + (H - padT - padB) * (1 - (v - min) / (max - min));
  const zeroY = y(0);

  const pathFor = (data) =>
    data.map((v, i) => `${i === 0 ? "M" : "L"} ${x(i).toFixed(1)} ${y(v).toFixed(1)}`).join(" ");

  return (
    <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", display: "block" }}>
      {/* linha do zero */}
      {min < 0 && max > 0 && (
        <line x1={padL} y1={zeroY} x2={W - padR} y2={zeroY} stroke={C.line} strokeWidth="1" strokeDasharray="3 3" />
      )}
      {/* destaque do mês selecionado */}
      {highlight != null && (
        <line x1={x(highlight)} y1={padT} x2={x(highlight)} y2={H - padB} stroke={C.line} strokeWidth="1.5" />
      )}
      {/* séries */}
      {series.map((s) => (
        <path key={s.name} d={pathFor(s.data)} fill="none" stroke={s.color}
          strokeWidth="2.4" strokeLinejoin="round" strokeLinecap="round" />
      ))}
      {/* pontos do mês destacado */}
      {highlight != null && series.map((s) => (
        <circle key={s.name} cx={x(highlight)} cy={y(s.data[highlight])} r="3.6"
          fill="#fff" stroke={s.color} strokeWidth="2.4" />
      ))}
      {/* rótulos dos meses */}
      {MONTHS.map((m, i) => (
        <text key={i} x={x(i)} y={H - 6} textAnchor="middle"
          fontSize="9" fontWeight={i === highlight ? 700 : 500}
          fill={i === highlight ? C.ink : C.sub}>{m[0]}</text>
      ))}
    </svg>
  );
}

/* ============================ LANÇAMENTOS ============================ */
function Entries({ entries, budgets, month, personView = "Fernando", setEditing, setEntries, persistNow }) {
  const [filterKind, setFilterKind] = useState("Tudo"); // Tudo | Despesas | Entradas
  const [search, setSearch] = useState("");
  const [openCat, setOpenCat] = useState(null); // categoria expandida (só uma por vez)
  const toast = useToast();
  const catRefs = useRef({});

  const toggle = (cat) => {
    setOpenCat((cur) => {
      const next = cur === cat ? null : cat;
      if (next) {
        // ao abrir, rola suavemente até o cabeçalho da categoria ficar visível
        // logo abaixo do header fixo (espera o React renderizar os itens)
        setTimeout(() => {
          const el = catRefs.current[cat];
          if (!el) return;
          const header = document.querySelector("[data-appheader]");
          const offset = (header ? header.offsetHeight : 96) + 12;
          const top = el.getBoundingClientRect().top + window.scrollY;
          window.scrollTo({ top: Math.max(0, top - offset), behavior: "smooth" });
        }, 60);
      }
      return next;
    });
  };

  const accent = personColor(personView);   // cor do perfil que está editando
  const accentSoft = personSoft(personView);

  const setMonthValue = useCallback((id, value) => {
    setEntries((prev) => {
      const next = prev.map((e) =>
        e.id === id ? { ...e, monthly: e.monthly.map((v, i) => (i === month ? value : v)) } : e
      );
      persistNow(next);
      return next;
    });
  }, [month, setEntries, persistNow]);

  const del = useCallback((id, scope = "all") => {
    setEntries((prev) => {
      const target = prev.find((e) => e.id === id);
      if (!target) return prev;
      let next;
      if (scope === "month") {
        // zera só o mês corrente; remove o status pago daquele mês
        const monthly = target.monthly.map((v, i) => (i === month ? 0 : v));
        const paid = { ...(target.paid || {}) };
        delete paid[month];
        const updated = { ...target, monthly, paid };
        // se ficou tudo zerado, remove o lançamento inteiro
        const allZero = monthly.every((v) => !v);
        next = allZero
          ? prev.filter((e) => e.id !== id)
          : prev.map((e) => (e.id === id ? updated : e));
        toast(`"${target.name}" removido de ${MONTHS_FULL[month]}`, { tone: "danger" });
      } else {
        next = prev.filter((e) => e.id !== id);
        toast(`"${target.name}" excluído de todos os meses`, { tone: "danger" });
      }
      persistNow(next);
      return next;
    });
  }, [setEntries, persistNow, toast, month]);

  // marca/desmarca uma despesa como paga NAQUELE mês (status por mês)
  const togglePaid = useCallback((id) => {
    setEntries((prev) => {
      const next = prev.map((e) => {
        if (e.id !== id) return e;
        const paid = { ...(e.paid || {}) };
        if (paid[month]) delete paid[month]; else paid[month] = true;
        return { ...e, paid };
      });
      persistNow(next);
      return next;
    });
  }, [month, setEntries, persistNow]);

  const groups = useMemo(() => {
    const filtered = entries.filter((e) => {
      if (e.person !== personView) return false;
      if (filterKind === "Despesas" && e.kind !== "expense") return false;
      if (filterKind === "Entradas" && e.kind !== "income") return false;
      if (search && !e.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
    const order = filterKind === "Entradas" ? ["Renda"] : [...CATEGORIES, "Renda"];
    return order
      .map((cat) => ({
        cat,
        items: filtered.filter((e) => e.category === cat),
      }))
      .filter((g) => g.items.length);
  }, [entries, personView, filterKind, search]);

  const searching = search.trim().length > 0;

  const seg = (val, set, opts) => (
    <div style={{ display: "flex", background: C.panel, border: `1px solid ${C.line}`, borderRadius: 10, padding: 3, gap: 2 }}>
      {opts.map((o) => (
        <button key={o} onClick={() => set(o)} style={{
          border: "none", background: val === o ? C.petrol : "transparent",
          color: val === o ? "#fff" : C.sub, fontSize: 12, fontWeight: 600,
          padding: "6px 10px", borderRadius: 8, cursor: "pointer", transition: ".15s",
        }}>{o}</button>
      ))}
    </div>
  );

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Banner de contexto de pessoa (mesmo padrão do Painel) */}
      <div style={{
        display: "flex", alignItems: "center", gap: 9, padding: "10px 14px",
        background: accentSoft, borderRadius: 12, border: `1px solid ${accent}22`,
      }}>
        <span style={{
          width: 26, height: 26, borderRadius: 999, background: accent, color: "#fff",
          fontSize: 12, fontWeight: 800, display: "inline-flex", alignItems: "center", justifyContent: "center",
        }}>{PERSON[personView].initial}</span>
        <span style={{ fontSize: 13, fontWeight: 600, color: accent }}>
          Vendo apenas os lançamentos de {personView}
        </span>
      </div>

      {/* Busca */}
      <div style={{ display: "flex", gap: 8, alignItems: "center", background: C.bg, border: `1px solid ${C.line}`, borderRadius: 12, padding: "8px 12px" }}>
        <Search size={16} color={C.sub} />
        <input
          value={search} onChange={(e) => setSearch(e.target.value)}
          placeholder="Buscar lançamento..."
          style={{ border: "none", outline: "none", fontSize: 14, flex: 1, color: C.ink, background: "transparent", fontFamily: "Inter" }}
        />
        {search && (
          <button onClick={() => setSearch("")} style={iconBtn}><X size={15} color={C.sub} /></button>
        )}
      </div>

      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center", justifyContent: "space-between" }}>
        {seg(filterKind, setFilterKind, ["Tudo", "Despesas", "Entradas"])}
        <MonthBadge month={month} />
      </div>

      {groups.map(({ cat, items }) => {
        const Icon = cat === "Renda" ? Wallet : (CAT_ICON[cat] || Package);
        const isIncome = cat === "Renda";
        const total = items.reduce((a, e) => a + (e.monthly[month] || 0), 0);
        const isOpen = searching || openCat === cat;
        // contagem de pagamento/recebimento (itens com valor no mês)
        const payable = items.filter((e) => (e.monthly[month] || 0) > 0);
        const paidCount = payable.filter((e) => e.paid && e.paid[month]).length;
        const allPaid = payable.length > 0 && paidCount === payable.length;
        const pending = payable.length - paidCount;
        return (
          <Card key={cat} style={{
            padding: 0,
            ...(isOpen ? {
              border: `1.5px solid ${accent}`,
              boxShadow: `0 2px 10px ${accentSoft}`,
            } : {}),
          }}>
            <button ref={(el) => { catRefs.current[cat] = el; }} onClick={() => toggle(cat)} style={{
              width: "100%", textAlign: "left", border: "none",
              background: isOpen ? accentSoft : "transparent",
              borderTopLeftRadius: 13, borderTopRightRadius: 13,
              cursor: "pointer", display: "flex", alignItems: "center", gap: 10,
              padding: "12px 14px", borderBottom: isOpen ? `1px solid ${accent}22` : "none",
              transition: "background .18s ease",
            }}>
              <div style={{ width: 30, height: 30, borderRadius: 9, background: isIncome ? C.greenSoft : (isOpen ? accent : C.petrolSoft), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                <Icon size={16} color={isIncome ? C.green : (isOpen ? "#fff" : C.petrol)} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <span style={{ fontWeight: isOpen ? 700 : 600, fontFamily: "Sora", fontSize: 14, color: isOpen ? accent : C.ink }}>{cat}</span>
                <div style={{ fontSize: 10.5, color: C.sub, marginTop: 2 }}>
                  {items.length} {items.length === 1 ? "lançamento" : "lançamentos"}
                </div>
                {payable.length > 0 && (
                  <div style={{ fontSize: 10.5, marginTop: 1 }}>
                    {allPaid
                      ? <span style={{ color: C.green, fontWeight: 700, display: "inline-flex", alignItems: "center", gap: 3 }}><Check size={11} strokeWidth={3} /> {isIncome ? "tudo recebido" : "tudo pago"}</span>
                      : <span style={{ color: C.sub, fontWeight: 600 }}>{pending} {isIncome ? "a receber" : "a pagar"}</span>}
                  </div>
                )}
              </div>
              <span style={{ fontWeight: 700, fontSize: 14, color: isIncome ? C.green : C.ink }}>{fmtShort(total)}</span>
              <ChevronRight size={18} color={isOpen ? accent : C.sub} style={{ transform: isOpen ? "rotate(90deg)" : "none", transition: "transform .2s", flexShrink: 0 }} />
            </button>
            {isOpen && (
              <div>
                {items.map((e, idx) => (
                  <EntryRow key={e.id} e={e} month={month} last={idx === items.length - 1}
                    onChange={(v) => setMonthValue(e.id, v)} onTogglePaid={() => togglePaid(e.id)}
                    onEdit={() => setEditing(e)} onDelete={(scope) => del(e.id, scope)} />
                ))}
              </div>
            )}
          </Card>
        );
      })}
      {!groups.length && (
        <div style={{ textAlign: "center", padding: 40, color: C.sub, fontSize: 14 }}>
          Nenhum lançamento encontrado.
        </div>
      )}
    </div>
  );
}

function EntryRow({ e, month, last, onChange, onTogglePaid, onEdit, onDelete }) {
  const [val, setVal] = useState(numToInput(e.monthly[month] ?? 0));
  const [focus, setFocus] = useState(false);
  const [confirmDel, setConfirmDel] = useState(false);
  useEffect(() => { if (!focus) setVal(numToInput(e.monthly[month] ?? 0)); }, [e, month, focus]);

  const commit = () => {
    const num = parseInput(val);
    onChange(num);
    setFocus(false);
  };
  const isIncome = e.kind === "income";
  const pc = personColor(e.person);
  const paid = !!(e.paid && e.paid[month]);

  return (
    <div style={{
      display: "flex", alignItems: "center", gap: 8, padding: "10px 14px",
      borderBottom: last ? "none" : `1px solid ${C.line}`, position: "relative",
      background: paid ? C.greenSoft : "transparent", transition: "background .2s",
    }}>
      <div style={{ position: "absolute", left: 0, top: 8, bottom: 8, width: 3, borderRadius: 99, background: pc }} />

      {/* Checkbox: despesas = pago, entradas = recebido */}
      <button onClick={onTogglePaid} title={paid ? (isIncome ? "Marcar como não recebido" : "Marcar como não pago") : (isIncome ? "Marcar como recebido" : "Marcar como pago")} style={{
        flexShrink: 0, width: 22, height: 22, borderRadius: 6, cursor: "pointer",
        border: `1.5px solid ${paid ? C.green : C.line}`,
        background: paid ? C.green : C.bg, display: "flex", alignItems: "center", justifyContent: "center",
        transition: ".15s", marginLeft: 4,
      }}>
        {paid && <Check size={14} color="#fff" strokeWidth={3} />}
      </button>

      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: 14, color: C.ink, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{e.name}</div>
        <div style={{ marginTop: 3 }}>
          <span style={{
            display: "inline-flex", alignItems: "center", gap: 4,
            background: personSoft(e.person), color: pc, fontSize: 10, fontWeight: 700,
            padding: "1px 7px 1px 4px", borderRadius: 999,
          }}>
            <span style={{
              width: 12, height: 12, borderRadius: 999, background: pc, color: "#fff",
              fontSize: 8, fontWeight: 800, display: "inline-flex", alignItems: "center", justifyContent: "center",
            }}>{PERSON[e.person] ? PERSON[e.person].initial : "?"}</span>
            {e.person}
          </span>
        </div>
      </div>

      <div style={{
        display: "flex", alignItems: "center",
        border: `1px solid ${focus ? C.petrol : C.line}`, borderRadius: 9,
        padding: "5px 9px", background: focus ? C.petrolSoft : (paid ? C.bg : C.panel), transition: ".15s",
      }}>
        <span style={{ fontSize: 12, color: C.sub, marginRight: 3 }}>R$</span>
        <input
          inputMode="decimal" value={val}
          onFocus={(ev) => { setFocus(true); ev.target.select(); }}
          onChange={(ev) => setVal(ev.target.value)}
          onBlur={commit}
          onKeyDown={(ev) => ev.key === "Enter" && ev.target.blur()}
          style={{
            border: "none", outline: "none", width: 68, textAlign: "right",
            fontSize: 14, fontWeight: 600, color: isIncome ? C.green : C.ink,
            background: "transparent", fontFamily: "Inter",
          }}
        />
      </div>
      <button onClick={onEdit} style={iconBtn}><Pencil size={14} color={C.sub} /></button>
      <button onClick={() => setConfirmDel(true)} style={iconBtn}><Trash2 size={14} color={C.red} /></button>

      {confirmDel && (
        <div onClick={() => setConfirmDel(false)} style={{
          position: "fixed", inset: 0, background: "rgba(30,42,51,.4)", backdropFilter: "blur(3px)",
          display: "flex", alignItems: "center", justifyContent: "center", zIndex: 70, padding: 24,
        }}>
          <div onClick={(ev) => ev.stopPropagation()} style={{
            background: C.bg, borderRadius: 18, padding: 22, maxWidth: 340, width: "100%",
            boxShadow: "0 20px 50px rgba(15,23,42,.3)", animation: "toastIn .24s cubic-bezier(.16,1,.3,1)",
          }}>
            <div style={{ display: "flex", alignItems: "center", gap: 11, marginBottom: 12 }}>
              <span style={{
                width: 38, height: 38, borderRadius: 11, background: C.redSoft, flexShrink: 0,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
              }}><Trash2 size={18} color={C.red} /></span>
              <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 16, color: C.ink }}>
                Remover lançamento
              </div>
            </div>
            <div style={{ fontSize: 13.5, color: C.sub, lineHeight: 1.5, marginBottom: 18 }}>
              O que você quer fazer com "{e.name}"?
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
              <button onClick={() => { setConfirmDel(false); onDelete("month"); }} style={{
                border: `1px solid ${C.line}`, background: C.bg, color: C.ink, textAlign: "left",
                borderRadius: 12, padding: "12px 14px", cursor: "pointer",
              }}>
                <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "Sora" }}>Remover só de {MONTHS_FULL[month]}</div>
                <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>Mantém o lançamento nos outros meses</div>
              </button>
              <button onClick={() => { setConfirmDel(false); onDelete("all"); }} style={{
                border: "none", background: C.red, color: "#fff", textAlign: "left",
                borderRadius: 12, padding: "12px 14px", cursor: "pointer",
              }}>
                <div style={{ fontSize: 14, fontWeight: 700, fontFamily: "Sora" }}>Excluir de todos os meses</div>
                <div style={{ fontSize: 12, color: "rgba(255,255,255,.85)", marginTop: 2 }}>Remove o lançamento do ano inteiro</div>
              </button>
              <button onClick={() => setConfirmDel(false)} style={{
                border: "none", background: "transparent", color: C.sub,
                borderRadius: 11, padding: "9px 14px", fontSize: 14, fontWeight: 600, cursor: "pointer",
              }}>Cancelar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
const iconBtn = { border: "none", background: "transparent", cursor: "pointer", padding: 5, borderRadius: 7, display: "flex" };

/* ============================ MODAL ADD/EDIT ============================ */
function EntryModal({ editing, month, onClose, onSave, existingNames, defaultPerson = "Fernando" }) {
  const isNew = editing === "new";
  const base = isNew
    ? { id: null, kind: "expense", category: "Moradia", person: defaultPerson, name: "", monthly: Array(12).fill(0) }
    : editing;
  const [kind, setKind] = useState(base.kind);
  const [category, setCategory] = useState(base.category === "Renda" ? "Moradia" : base.category);
  const [person, setPerson] = useState(base.person);
  const [name, setName] = useState(base.name);
  const [amount, setAmount] = useState(numToInput(base.monthly[month] ?? 0));
  const [catOpen, setCatOpen] = useState(false); // acordeão da categoria
  const [nameMode, setNameMode] = useState("type"); // "type" (Nova) primeiro; "pick" só ao clicar
  const [sugQuery, setSugQuery] = useState(""); // filtro da lista de sugestões
  const [recur, setRecur] = useState(false);
  // meses marcados para repetir (índices). Começa vazio.
  const [months, setMonths] = useState([]);

  const suggestions = useMemo(() => {
    const cat = kind === "income" ? "Renda" : category;
    return [...new Set(existingNames.filter((n) => n.cat === cat).map((n) => n.name))]
      .sort((a, b) => a.localeCompare(b, "pt", { sensitivity: "base" }));
  }, [existingNames, kind, category]);

  const scopeColor = personColor(person);

  const save = () => {
    const num = parseInput(amount);
    const monthly = [...base.monthly];
    if (recur && months.length) {
      months.forEach((m) => { monthly[m] = num; });
      if (!months.includes(month)) monthly[month] = num; // garante o mês atual
    } else {
      monthly[month] = num;
    }
    onSave({
      id: base.id || uid(),
      kind,
      category: kind === "income" ? "Renda" : category,
      person, name: name.trim() || "Sem nome", monthly,
    }, isNew);
  };

  const toggleMonth = (m) =>
    setMonths((prev) => prev.includes(m) ? prev.filter((x) => x !== m) : [...prev, m]);

  const CatIcon = CAT_ICON[category] || Package;

  return (
    <div onClick={onClose} style={{
      position: "fixed", inset: 0, background: "rgba(30,42,51,.4)", backdropFilter: "blur(3px)",
      display: "flex", alignItems: "flex-end", justifyContent: "center", zIndex: 50,
    }}>
      <div onClick={(e) => e.stopPropagation()} style={{
        background: C.bg, width: "100%", maxWidth: 480, borderRadius: "22px 22px 0 0",
        padding: 20, maxHeight: "92vh", overflowY: "auto",
        animation: "slideUp .28s cubic-bezier(.2,.8,.2,1)",
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <div style={{ fontWeight: 700, fontFamily: "Sora", fontSize: 18, color: C.ink }}>
            {isNew ? "Novo lançamento" : "Editar lançamento"}
          </div>
          <button onClick={onClose} style={iconBtn}><X size={20} color={C.sub} /></button>
        </div>

        {/* 1. QUEM */}
        <Label>Quem</Label>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {PEOPLE.map((p) => {
            const a = person === p;
            const pc = personColor(p);
            return (
              <button key={p} onClick={() => setPerson(p)} style={{
                flex: 1, border: `1px solid ${a ? pc : C.line}`,
                background: a ? pc : C.bg, color: a ? "#fff" : C.ink,
                padding: "10px 12px", borderRadius: 10, fontSize: 13, fontWeight: 700,
                cursor: "pointer", transition: ".15s", display: "flex",
                alignItems: "center", justifyContent: "center", gap: 7,
              }}>
                <span style={{
                  width: 18, height: 18, borderRadius: 999,
                  background: a ? "rgba(255,255,255,.25)" : personSoft(p),
                  color: a ? "#fff" : pc, fontSize: 10, fontWeight: 800,
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                }}>{PERSON[p].initial}</span>
                {p}
              </button>
            );
          })}
        </div>

        {/* 2. TIPO */}
        <Label>Tipo</Label>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {[
            { k: "expense", icon: ArrowDownRight, label: "Despesa", col: C.red },
            { k: "income", icon: ArrowUpRight, label: "Entrada", col: C.green },
          ].map(({ k, icon: Icon, label, col }) => {
            const a = kind === k;
            return (
              <button key={k} onClick={() => setKind(k)} style={{
                flex: 1, border: `1px solid ${a ? col : C.line}`,
                background: a ? col : C.bg, color: a ? "#fff" : C.ink,
                padding: "10px 12px", borderRadius: 10, fontSize: 13, fontWeight: 700,
                cursor: "pointer", transition: ".15s", display: "flex",
                alignItems: "center", justifyContent: "center", gap: 7,
              }}>
                <Icon size={15} /> {label}
              </button>
            );
          })}
        </div>

        {/* 3. CATEGORIA (acordeão) — só para despesa */}
        {kind === "expense" && (
          <>
            <Label>Categoria</Label>
            <div style={{ border: `1px solid ${C.line}`, borderRadius: 12, marginBottom: 16, overflow: "hidden" }}>
              <button onClick={() => setCatOpen((o) => !o)} style={{
                width: "100%", border: "none", background: C.panel, cursor: "pointer",
                display: "flex", alignItems: "center", gap: 10, padding: "11px 13px",
              }}>
                <div style={{ width: 28, height: 28, borderRadius: 8, background: C.petrolSoft, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <CatIcon size={15} color={C.petrol} />
                </div>
                <span style={{ flex: 1, textAlign: "left", fontSize: 14, fontWeight: 600, color: C.ink }}>{category}</span>
                <ChevronRight size={18} color={C.sub} style={{ transform: catOpen ? "rotate(90deg)" : "none", transition: "transform .2s" }} />
              </button>
              {catOpen && (
                <div style={{ borderTop: `1px solid ${C.line}`, maxHeight: 220, overflowY: "auto" }}>
                  {CATEGORIES.map((c) => {
                    const Icon = CAT_ICON[c] || Package;
                    const a = category === c;
                    return (
                      <button key={c} onClick={() => { setCategory(c); setCatOpen(false); }} style={{
                        width: "100%", border: "none", background: a ? C.petrolSoft : "transparent",
                        cursor: "pointer", display: "flex", alignItems: "center", gap: 10, padding: "10px 13px",
                        borderBottom: `1px solid ${C.line}`,
                      }}>
                        <Icon size={15} color={C.petrol} />
                        <span style={{ flex: 1, textAlign: "left", fontSize: 13, fontWeight: a ? 700 : 500, color: C.ink }}>{c}</span>
                        {a && <Check size={15} color={C.petrol} />}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          </>
        )}

        {/* 4. DESCRIÇÃO — Nova primeiro e selecionada */}
        <Label>Descrição</Label>
        {suggestions.length > 0 && (
          <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
            <button onClick={() => { setNameMode("type"); }} style={modeChip(nameMode === "type")}>Nova</button>
            <button onClick={() => setNameMode("pick")} style={modeChip(nameMode === "pick")}>Escolher existente</button>
          </div>
        )}
        {nameMode === "pick" && suggestions.length > 0 ? (
          <div style={{ marginBottom: 16 }}>
            <input
              value={sugQuery} onChange={(e) => setSugQuery(e.target.value)}
              placeholder="Filtrar descrições..."
              style={{ ...inputStyle, marginBottom: 8, fontSize: 13 }}
            />
            <div style={{ display: "flex", flexWrap: "wrap", gap: 7, maxHeight: 180, overflowY: "auto", padding: 2 }}>
              {suggestions
                .filter((s) => s.toLowerCase().includes(sugQuery.trim().toLowerCase()))
                .map((s) => {
                  const a = name === s;
                  return (
                    <button key={s} onClick={() => setName(s)} style={{
                      border: `1px solid ${a ? C.petrol : C.line}`, background: a ? C.petrol : C.bg,
                      color: a ? "#fff" : C.ink, padding: "8px 11px", borderRadius: 10, fontSize: 12,
                      fontWeight: 600, cursor: "pointer",
                    }}>{s}</button>
                  );
                })}
            </div>
          </div>
        ) : (
          <input
            value={name} onChange={(e) => setName(e.target.value)}
            placeholder="Ex.: Mercado, Farmácia, Salário..."
            style={inputStyle}
          />
        )}

        {/* 5. VALOR */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 7 }}>
          <span style={{ fontSize: 12, fontWeight: 600, color: C.sub, letterSpacing: .2 }}>Valor</span>
          {recur && months.length
            ? <span style={{ fontSize: 11, fontWeight: 700, color: C.sub }}>por mês</span>
            : <MonthBadge month={month} />}
        </div>
        <div style={{ display: "flex", alignItems: "center", border: `1.5px solid ${scopeColor}`, borderRadius: 12, padding: "12px 14px", marginBottom: 16 }}>
          <span style={{ fontSize: 18, color: C.sub, marginRight: 6 }}>R$</span>
          <input
            inputMode="decimal" value={amount}
            onChange={(e) => setAmount(e.target.value)}
            onFocus={(e) => e.target.select()}
            placeholder="0,00"
            style={{ border: "none", outline: "none", fontSize: 24, fontWeight: 700, color: C.ink, flex: 1, fontFamily: "Sora", background: "transparent" }}
          />
        </div>

        {/* 6. REPETIR — abre checkboxes dos meses restantes */}
        <label style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: recur ? 12 : 18, cursor: "pointer" }}>
          <div onClick={() => { const n = !recur; setRecur(n); if (!n) setMonths([]); }} style={{
            width: 44, height: 26, borderRadius: 99, background: recur ? C.green : C.line,
            position: "relative", transition: ".2s", flexShrink: 0,
          }}>
            <div style={{ position: "absolute", top: 3, left: recur ? 21 : 3, width: 20, height: 20, borderRadius: 99, background: "#fff", transition: ".2s", boxShadow: "0 1px 3px rgba(0,0,0,.2)" }} />
          </div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>Repetir em outros meses</div>
            <div style={{ fontSize: 11, color: C.sub }}>Marque os meses que recebem este valor</div>
          </div>
        </label>

        {recur && (
          <div style={{ marginBottom: 18 }}>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 7 }}>
              {MONTHS.map((mLabel, i) => {
                if (i < month) return null; // só meses restantes (a partir do atual)
                const checked = months.includes(i) || i === month;
                const isCurrent = i === month;
                return (
                  <button key={i} onClick={() => !isCurrent && toggleMonth(i)} style={{
                    border: `1px solid ${checked ? scopeColor : C.line}`,
                    background: checked ? scopeColor : C.bg, color: checked ? "#fff" : C.sub,
                    borderRadius: 9, padding: "9px 4px", fontSize: 12.5, fontWeight: 700,
                    cursor: isCurrent ? "default" : "pointer", opacity: isCurrent ? 0.7 : 1,
                    display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
                  }}>
                    {checked && <Check size={12} />}{mLabel}
                  </button>
                );
              })}
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
              <button onClick={() => setMonths(Array.from({ length: 12 - month }, (_, k) => month + k))}
                style={miniBtn}>Todos restantes</button>
              <button onClick={() => setMonths([])} style={miniBtn}>Limpar</button>
            </div>
            <div style={{ fontSize: 11, color: C.sub, marginTop: 8 }}>
              {(() => {
                const sel = [...new Set([month, ...months])].length;
                return `${sel} ${sel === 1 ? "mês" : "meses"} · total ${fmt(parseInput(amount) * sel)}`;
              })()}
            </div>
          </div>
        )}

        <button onClick={save} style={{
          width: "100%", border: "none", background: C.petrol, color: "#fff",
          padding: 15, borderRadius: 13, fontSize: 15, fontWeight: 700, fontFamily: "Sora",
          cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
        }}>

/* ============================ COMPRAR? (assistente de compra) ============================ */
function BuyAdvisor({ entries, saldoInicial, month }) {
  const [amountStr, setAmountStr] = useState("");
  const [who, setWho] = useState("Fernando"); // Fernando | Helen

  const amount = parseInput(amountStr);
  const RESERVE = 0.30; // mantém 30% da folga intacta -> usa no máx 70%
  const USABLE = 1 - RESERVE;

  // Projeção do saldo acumulado mês a mês para o escopo escolhido (sem a compra)
  const proj = useMemo(() => {
    const inScope = (e) => who === "Casal" || e.person === who;
    const monthly = MONTHS.map((_, m) => {
      let inc = 0, exp = 0;
      entries.forEach((e) => {
        if (!inScope(e)) return;
        const v = e.monthly[m] || 0;
        if (e.kind === "income") inc += v; else exp += v;
      });
      return { inc, exp, net: inc - exp };
    });
    let run = who === "Casal" ? saldoInicial : 0;
    const balance = monthly.map((mo) => (run += mo.net));
    return { monthly, balance };
  }, [entries, saldoInicial, who]);

  // Saldo acumulado disponível AGORA (mês selecionado) e folga média futura
  const saldoAtual = proj.balance[month];
  const remainingMonths = 12 - month; // inclui o mês atual
  // folga média mensal projetada dos meses restantes (net)
  const avgNet = proj.monthly.slice(month).reduce((a, m) => a + m.net, 0) / Math.max(1, remainingMonths);

  // ---- Análise à vista ----
  // À vista usa o saldo acumulado atual; respeita reserva de 30% do saldo.
  const usableNow = Math.max(0, saldoAtual) * USABLE;
  const aVistaOk = amount > 0 && amount <= usableNow;
  const aVistaTight = amount > usableNow && amount <= Math.max(0, saldoAtual);

  // ---- Análise parcelada (sem juros) ----
  // Para N parcelas, a parcela mensal não pode comprometer mais que 70% da folga
  // mensal projetada de cada mês em que a parcela cai, e o saldo acumulado
  // projetado não pode ficar negativo em nenhum mês.
  function simulateInstallments(n) {
    const parcela = amount / n;
    const fitsInYear = month + n <= 12;
    let comfortable = fitsInYear;
    // cada parcela não pode comprometer mais que 70% da folga do mês em que cai
    for (let i = 0; i < n; i++) {
      const m = month + i;
      if (m > 11) { comfortable = false; break; }
      const folgaMes = proj.monthly[m].net;
      if (parcela > folgaMes * USABLE) comfortable = false;
    }
    // saldo acumulado projetado, descontando as parcelas mês a mês
    let bal = month > 0 ? proj.balance[month - 1] : (who === "Casal" ? saldoInicial : 0);
    let worstBalance = Infinity;
    for (let m = month; m < 12; m++) {
      const parcelaDoMes = (m >= month && m < month + n) ? parcela : 0;
      bal += proj.monthly[m].net - parcelaDoMes;
      if (bal < worstBalance) worstBalance = bal;
    }
    if (worstBalance < 0) comfortable = false;
    return { n, parcela, comfortable, worstBalance, fitsInYear };
  }

  const options = [1, 2, 3, 4, 6, 10, 12].map(simulateInstallments).filter((o) => o.fitsInYear);
  // melhor opção: menor nº de parcelas que seja confortável; se nenhuma, a que deixa melhor saldo
  const comfy = options.filter((o) => o.comfortable);
  const best = amount > 0
    ? (aVistaOk ? { type: "avista" }
       : comfy.length ? { type: "parcela", ...comfy[0] }
       : options.length ? { type: "parcela", ...[...options].sort((a, b) => b.worstBalance - a.worstBalance)[0], forced: true }
       : null)
    : null;

  // melhor mês para comprar à vista: primeiro mês cujo saldo acumulado * 70% >= valor
  const bestMonth = useMemo(() => {
    if (amount <= 0) return null;
    for (let m = month; m < 12; m++) {
      if (Math.max(0, proj.balance[m]) * USABLE >= amount) return m;
    }
    return null;
  }, [amount, proj, month]);

  const scopeColor = personColor(who);

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <Card style={{ padding: 18 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 17, color: C.ink }}>
            Vale a pena comprar?
          </div>
          <MonthBadge month={month} />
        </div>
        <div style={{ fontSize: 12.5, color: C.sub, marginTop: 4, lineHeight: 1.5 }}>
          Informe o valor e quem vai comprar. O app analisa seu saldo projetado e
          sugere a melhor forma de pagar — mantendo 30% de folga como reserva.
        </div>

        {/* Quem */}
        <div style={{ fontSize: 12, fontWeight: 600, color: C.sub, marginTop: 14, marginBottom: 7 }}>Quem vai comprar</div>
        <div style={{ display: "flex", gap: 8 }}>
          {["Fernando", "Helen"].map((p) => {
            const a = who === p;
            const col = personColor(p);
            return (
              <button key={p} onClick={() => setWho(p)} style={{
                flex: 1, border: `1px solid ${a ? col : C.line}`,
                background: a ? col : C.bg, color: a ? "#fff" : C.ink,
                padding: "9px 6px", borderRadius: 10, fontSize: 13, fontWeight: 700,
                cursor: "pointer", transition: ".15s", display: "flex",
                alignItems: "center", justifyContent: "center", gap: 7,
              }}>
                <span style={{
                  width: 18, height: 18, borderRadius: 999,
                  background: a ? "rgba(255,255,255,.25)" : personSoft(p),
                  color: a ? "#fff" : col, fontSize: 10, fontWeight: 800,
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                }}>{PERSON[p].initial}</span>
                {p}
              </button>
            );
          })}
        </div>

        {/* Valor */}
        <div style={{ fontSize: 12, fontWeight: 600, color: C.sub, marginTop: 14, marginBottom: 7 }}>Valor da compra</div>
        <div style={{ display: "flex", alignItems: "center", border: `1.5px solid ${scopeColor}`, borderRadius: 12, padding: "12px 14px" }}>
          <span style={{ fontSize: 18, color: C.sub, marginRight: 6 }}>R$</span>
          <input
            inputMode="decimal" value={amountStr}
            onChange={(e) => setAmountStr(e.target.value)}
            placeholder="0,00"
            style={{ border: "none", outline: "none", fontSize: 24, fontWeight: 700, color: C.ink, flex: 1, fontFamily: "Sora", background: "transparent" }}
          />
        </div>
      </Card>

      {amount > 0 && (
        <>
          {/* Recomendação principal */}
          <Card accent={best && best.type === "avista" ? C.green : best && !best.forced ? scopeColor : C.red}>
            <div style={{ fontSize: 12, fontWeight: 700, color: C.sub, letterSpacing: .3, marginBottom: 6 }}>RECOMENDAÇÃO</div>
            {best && best.type === "avista" && (
              <div>
                <div style={{ fontSize: 18, fontFamily: "Sora", fontWeight: 700, color: C.green }}>
                  Pode comprar à vista
                </div>
                <div style={{ fontSize: 13, color: C.sub, marginTop: 4, lineHeight: 1.5 }}>
                  Você tem folga de sobra em {MONTHS_FULL[month]}. Mesmo pagando tudo agora,
                  ainda fica dentro da sua margem de segurança.
                </div>
              </div>
            )}
            {best && best.type === "parcela" && !best.forced && (
              <div>
                <div style={{ fontSize: 18, fontFamily: "Sora", fontWeight: 700, color: scopeColor }}>
                  Parcele em {best.n}x de {fmt(best.parcela)}
                </div>
                <div style={{ fontSize: 13, color: C.sub, marginTop: 4, lineHeight: 1.5 }}>
                  À vista comprometeria demais seu mês. Em {best.n}x sem juros, cada parcela
                  cabe na folga mensal sem te apertar.
                </div>
              </div>
            )}
            {best && best.forced && (
              <div>
                <div style={{ fontSize: 18, fontFamily: "Sora", fontWeight: 700, color: C.red }}>
                  Atenção: aperta o orçamento
                </div>
                <div style={{ fontSize: 13, color: C.sub, marginTop: 4, lineHeight: 1.5 }}>
                  Mesmo na melhor divisão ({best.n}x de {fmt(best.parcela)}), seu saldo
                  projetado fica baixo{best.worstBalance < 0 ? " (chega a ficar negativo)" : ""}.
                  {bestMonth != null && bestMonth > month
                    ? ` Considere esperar até ${MONTHS_FULL[bestMonth]}.`
                    : " Vale reavaliar a compra."}
                </div>
              </div>
            )}
            {!best && (
              <div style={{ fontSize: 14, color: C.sub }}>Informe um valor para analisar.</div>
            )}
          </Card>

          {/* Contexto: quanto dá pra gastar */}
          <Card>
            <div style={{ fontWeight: 600, fontFamily: "Sora", fontSize: 14, color: C.ink, marginBottom: 10 }}>
              Sua situação em {MONTHS_FULL[month]}
            </div>
            <Row label="Saldo acumulado" value={fmt(saldoAtual)} color={saldoAtual >= 0 ? C.green : C.red} />
            <Row label="Pode usar sem comprometer (70%)" value={fmt(usableNow)} color={C.ink} />
            <Row label="Folga média dos próximos meses" value={fmt(avgNet)} color={avgNet >= 0 ? C.green : C.red} />
            <Row label="Valor da compra" value={fmt(amount)} color={scopeColor} last />
          </Card>

          {/* Tabela de parcelamento */}
          <Card>
            <div style={{ fontWeight: 600, fontFamily: "Sora", fontSize: 14, color: C.ink, marginBottom: 4 }}>
              Formas de pagar
            </div>
            <div style={{ fontSize: 11.5, color: C.sub, marginBottom: 10 }}>
              Verde = confortável · Vermelho = aperta o saldo projetado
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
              {[{ n: 1, parcela: amount, comfortable: aVistaOk, worstBalance: saldoAtual - amount, label: "À vista" },
                ...options.filter((o) => o.n > 1)].map((o) => {
                const ok = o.comfortable;
                return (
                  <div key={o.n} style={{
                    display: "flex", alignItems: "center", gap: 10, padding: "10px 12px",
                    borderRadius: 10, background: ok ? C.greenSoft : C.redSoft,
                  }}>
                    <span style={{
                      width: 26, height: 26, borderRadius: 8, flexShrink: 0,
                      background: ok ? C.green : C.red, color: "#fff", fontSize: 11, fontWeight: 800,

                        {ok ? "Cabe no orçamento" : (o.worstBalance < 0 ? "Saldo fica negativo" : "Aperta a folga")}
                      </div>
                    </div>
                    {ok
                      ? <Check size={16} color={C.green} />
                      : <AlertTriangle size={15} color={C.red} />}
                  </div>
                );
              })}
            </div>
          </Card>

          {/* Melhor data */}
          {bestMonth != null && (
            <Card accent={C.couple}>
              <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                <Calendar size={18} color={C.couple} style={{ flexShrink: 0, marginTop: 2 }} />
                <div>

                  <div style={{ fontSize: 12.5, color: C.sub, lineHeight: 1.5 }}>
                    {bestMonth === month
                      ? `Agora mesmo (${MONTHS_FULL[month]}) você já tem saldo confortável para pagar à vista.`
                      : `A partir de ${MONTHS_FULL[bestMonth]} seu saldo projetado comporta essa compra à vista sem comprometer a reserva.`}
                  </div>
                </div>

          )}

          <div style={{ fontSize: 11, color: C.sub, textAlign: "center", lineHeight: 1.5, padding: "0 8px" }}>
            Estimativas baseadas nos seus lançamentos previstos e em parcelas sem juros.

  );

/* ============================ TOASTS ============================ */
const ToastContext = React.createContext(() => {});
const useToast = () => React.useContext(ToastContext);

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const idRef = useRef(0);

  const show = useCallback((message, opts = {}) => {
    const id = ++idRef.current;
    const tone = opts.tone || "neutral"; // neutral | success | danger
    setToasts((t) => [...t, { id, message, tone }]);
    const ttl = opts.duration || 2600;
    setTimeout(() => {
      setToasts((t) => t.map((x) => (x.id === id ? { ...x, leaving: true } : x)));
      setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 240);
    }, ttl);
  }, []);

  const toneStyle = {
    neutral: { dot: C.couple, icon: <Check size={15} color="#fff" strokeWidth={3} /> },
    success: { dot: C.green, icon: <Check size={15} color="#fff" strokeWidth={3} /> },
    danger: { dot: C.red, icon: <Trash2 size={14} color="#fff" /> },
  };

  return (
    <ToastContext.Provider value={show}>
      <style>{`
        @keyframes toastIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(10px) scale(.97)}}
      `}</style>
      {children}
      <div style={{
        position: "fixed", left: 0, right: 0, bottom: "calc(96px + env(safe-area-inset-bottom))",
        maxWidth: 480, margin: "0 auto", padding: "0 16px", zIndex: 60,
        display: "flex", flexDirection: "column", alignItems: "center", gap: 8, pointerEvents: "none",
      }}>
        {toasts.map((t) => {
          const ts = toneStyle[t.tone] || toneStyle.neutral;
          return (
            <div key={t.id} style={{
              display: "flex", alignItems: "center", gap: 11,
              background: "rgba(30,41,59,.96)", backdropFilter: "blur(8px)",
              color: "#fff", borderRadius: 14, padding: "11px 16px 11px 12px",
              boxShadow: "0 10px 30px rgba(15,23,42,.32)", maxWidth: "100%",
              border: "1px solid rgba(255,255,255,.08)",
              animation: t.leaving ? "toastOut .22s ease forwards" : "toastIn .28s cubic-bezier(.16,1,.3,1)",
            }}>
              <span style={{
                width: 26, height: 26, borderRadius: 999, background: ts.dot, flexShrink: 0,
                display: "inline-flex", alignItems: "center", justifyContent: "center",
              }}>{ts.icon}</span>
              <span style={{ fontSize: 13.5, fontWeight: 600, fontFamily: "Sora", letterSpacing: .1 }}>{t.message}</span>
            </div>
          );
        })}
      </div>
    </ToastContext.Provider>
  );
}

    const strip = monthStripRef.current;
    if (!btn || !strip) return;
    const target = btn.offsetLeft - (strip.clientWidth - btn.clientWidth) / 2;
    strip.scrollTo({ left: Math.max(0, target), behavior: "smooth" });
  }, [month, loaded, tab]);

  // initial load — resiliente: nunca trava no spinner
  useEffect(() => {
    let done = false;
    const finish = () => { if (!done) { done = true; setLoaded(true); } };

    // rede de segurança: se em 8s nada carregar, abre com os dados locais (seed)
    const safety = setTimeout(() => {
      if (done) return;
      const seeded = seedToState(SEED);
      setEntries(seeded.entries);
      setBudgets(seeded.budgets);
      setSaldoInicial(seeded.saldoInicial);
      setSync("local");
      finish();
    }, 8000);

    (async () => {
      try {
        const stored = await loadState();
        if (stored && stored.entries) {
          setEntries(stored.entries);
          const nb = {}; Object.keys(stored.budgets || {}).forEach((c) => (nb[c] = budgetArr(stored.budgets[c])));
          setBudgets(nb);
          setSaldoInicial(stored.saldoInicial || 0);
          setSync(hasSupabase ? "ok" : "local");
        } else {
          const seeded = seedToState(SEED);
          setEntries(seeded.entries);
          setBudgets(seeded.budgets);
          setSaldoInicial(seeded.saldoInicial);
          if (hasSupabase) {
            try { await saveState(seeded); setSync("ok"); }
            catch { setSync("local"); }
          } else setSync("local");
        }
      } catch (err) {
        console.error("Falha ao carregar:", err);
        const seeded = seedToState(SEED);
        setEntries(seeded.entries);
        setBudgets(seeded.budgets);
        setSaldoInicial(seeded.saldoInicial);
        setSync("local");
      } finally {
        clearTimeout(safety);
        finish();
      }
    })();

    return () => clearTimeout(safety);
  }, []);

  // Realtime: quando o OUTRO celular salva, atualiza este aqui.
  // Ignora o eco do próprio save recente (evita corrida e flicker).
  useEffect(() => {
    if (!hasSupabase) return;
    const unsub = subscribeRemote((payload) => {
      if (!payload || !payload.entries) return;
      if (Date.now() - lastSaveRef.current < 2500) return; // eco do próprio save
      setEntries(payload.entries);
      const nb = {}; Object.keys(payload.budgets || {}).forEach((c) => (nb[c] = budgetArr(payload.budgets[c])));
      setBudgets(nb);
      setSaldoInicial(payload.saldoInicial || 0);
      setSync("ok");
    });
    return unsub;
  }, []);

  const persistNow = useCallback(async (overrideEntries) => {
    if (!hasSupabase) return;
    setSync("saving");
    lastSaveRef.current = Date.now();
    const payload = { entries: overrideEntries || entries, budgets, saldoInicial };
    let ok = await saveState(payload);
    if (!ok) {
      // tenta de novo uma vez (falhas transitórias de rede são comuns)
      await new Promise((r) => setTimeout(r, 700));
      lastSaveRef.current = Date.now();
      ok = await saveState(payload);
    }
    setSync(ok ? "ok" : "local");
  }, [entries, budgets, saldoInicial]);

  // persist when budgets/saldo change (after load)
  useEffect(() => {
    if (!loaded) return;
    persistNow();
    // eslint-disable-next-line
  }, [budgets, saldoInicial]);

  const comp = useComputed(entries, budgets, saldoInicial, personView);

  const existingNames = useMemo(
    () => entries.map((e) => ({ cat: e.category, name: e.name })), [entries]
  );

  const saveEntry = (entry, isNew) => {
    let merged = false;
    setEntries((prev) => {
      // EDIÇÃO: atualiza pelo id
      if (!isNew && prev.some((e) => e.id === entry.id)) {
        const next = prev.map((e) => (e.id === entry.id ? entry : e));
        persistNow(next);
        return next;
      }
      // NOVO: procura item igual (categoria + pessoa + tipo + nome) para somar
      const norm = (s) => (s || "").trim().toLowerCase();
      const match = prev.find((e) =>
        e.category === entry.category &&
        e.person === entry.person &&
        e.kind === entry.kind &&
        norm(e.name) === norm(entry.name)
      );
      if (match) {
        // soma mês a mês apenas os meses que o novo lançamento preencheu (≠ 0)
        const next = prev.map((e) => {
          if (e.id !== match.id) return e;
          const monthly = e.monthly.map((v, i) => v + (entry.monthly[i] || 0));
          return { ...e, monthly };
        });
        merged = true;
        persistNow(next);
        return next;
      }
      // sem correspondência: adiciona como novo (garante id único)
      let toAdd = entry;
      if (prev.some((e) => e.id === entry.id)) {
        toAdd = { ...entry, id: uid() + "-" + Math.random().toString(36).slice(2, 6) };
      }
      const next = [...prev, toAdd];
      persistNow(next);
      return next;
    });
    if (merged) toast(`Somado em "${entry.name.trim()}"`, { tone: "success" });
    setEditing(null);
  };

  if (!hasSupabase) {
    return (
      <div style={{ ...root, padding: 24, display: "flex", flexDirection: "column", gap: 14, justifyContent: "center", minHeight: "100vh" }}>
        <style>{FONT_IMPORT}</style>
        <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 20, color: C.petrol }}>
          Quase lá
        </div>
        <div style={{ fontSize: 14, color: C.sub, lineHeight: 1.6 }}>
          O app está pronto, mas ainda falta conectar o banco de dados na nuvem
          (Supabase) para sincronizar os dois celulares. Abra o arquivo
          <b> index.html</b>, preencha <b> SUPABASE_URL </b> e
          <b> SUPABASE_ANON_KEY </b> no bloco <b> CONFIG </b> lá no início, e
          recarregue.
        </div>
        <div style={{ fontSize: 13, color: C.sub }}>
          O passo a passo completo está no arquivo <b>LEIA-ME.md</b> do projeto.
        </div>
      </div>
    );
  }

  if (!loaded) {
    return (
      <div style={{ ...root, display: "flex", alignItems: "center", justifyContent: "center", minHeight: 400 }}>
        <style>{`${FONT_IMPORT} @keyframes spin{to{transform:rotate(360deg)}}`}</style>
        <RefreshCw size={28} color={C.petrol} style={{ animation: "spin 1s linear infinite" }} />
      </div>
    );
  }

  const syncBadge = {
    loading: { icon: <RefreshCw size={13} />, text: "Carregando", tone: "neutral" },
    saving: { icon: <RefreshCw size={13} style={{ animation: "spin 1s linear infinite" }} />, text: "Salvando", tone: "warn" },
    ok: { icon: <Cloud size={13} />, text: "Sincronizado", tone: "good" },
    local: { icon: <CloudOff size={13} />, text: "Local", tone: "warn" },
  }[sync];

  return (
    <div style={root}>
      <style>{`
        ${FONT_IMPORT}
        @keyframes spin{to{transform:rotate(360deg)}}
        @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
        *{font-family:'Inter',-apple-system,sans-serif;box-sizing:border-box}
        ::-webkit-scrollbar{width:0;height:0}
      `}</style>

      {/* Header */}
      <div data-appheader style={{ padding: "16px 16px 12px", background: C.bg, borderBottom: `1px solid ${C.line}`, position: "sticky", top: 0, zIndex: 20 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div>
            <div style={{ fontFamily: "Sora", fontWeight: 700, fontSize: 19, color: C.petrol, lineHeight: 1 }}>
              Nosso Orçamento
            </div>
            <div style={{ fontSize: 11, color: C.sub, marginTop: 3 }}>Fernando & Helen · 2026</div>
          </div>
          <button
            onClick={() => { if (sync === "local" && LAST_SYNC_ERROR) alert("Motivo da falha de sincronização:\n\n" + LAST_SYNC_ERROR); }}
            style={{ border: "none", background: "transparent", padding: 0, cursor: sync === "local" ? "pointer" : "default" }}>
            <Pill tone={syncBadge.tone}>{syncBadge.icon} {syncBadge.text}</Pill>
          </button>
        </div>

        {/* Month selector */}
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <button onClick={() => setMonth((m) => Math.max(0, m - 1))} disabled={month === 0} style={navArrow(month === 0)}>
            <ChevronLeft size={18} color={month === 0 ? C.line : C.petrol} />
          </button>
          <div ref={monthStripRef} style={{ flex: 1, overflowX: "auto", display: "flex", gap: 6, padding: "2px 0" }}>
            {MONTHS.map((m, i) => (
              <button key={m} ref={i === month ? activeMonthRef : null} onClick={() => setMonth(i)} style={{
                border: "none", borderRadius: 9, padding: "7px 13px", flexShrink: 0,
                background: i === month ? C.petrol : C.panel, color: i === month ? "#fff" : C.sub,
                fontSize: 13, fontWeight: 600, cursor: "pointer", transition: ".15s",
              }}>{m}</button>
            ))}
          </div>
          <button onClick={() => setMonth((m) => Math.min(11, m + 1))} disabled={month === 11} style={navArrow(month === 11)}>
            <ChevronRight size={18} color={month === 11 ? C.line : C.petrol} />
          </button>
        </div>

        {/* Person view selector — oculto em Comprar? e Ajustes */}
        {tab !== "buy" && tab !== "settings" && (
        <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
          {(tab === "entries" ? ["Fernando", "Helen"] : ["Casal", "Fernando", "Helen"]).map((p) => {
            const active = personView === p;
            const col = p === "Casal" ? C.couple : personColor(p);
            return (
              <button key={p} onClick={() => {
                setPersonView(p);
              }} style={{
                flex: 1, border: `1px solid ${active ? col : C.line}`,
                background: active ? col : C.bg, color: active ? "#fff" : C.sub,
                borderRadius: 10, padding: "8px 6px", fontSize: 13, fontWeight: 700,
                cursor: "pointer", transition: ".15s", display: "flex",
                alignItems: "center", justifyContent: "center", gap: 6,
              }}>
                {p !== "Casal" && (
                  <span style={{
                    width: 16, height: 16, borderRadius: 999,
                    background: active ? "rgba(255,255,255,.25)" : personSoft(p),
                    color: active ? "#fff" : col, fontSize: 9, fontWeight: 800,
                    display: "inline-flex", alignItems: "center", justifyContent: "center",
                  }}>{PERSON[p].initial}</span>
                )}
                {p}
              </button>
            );
          })}
        </div>
        )}
      </div>

      {/* Content */}
      <div style={{ padding: 16, paddingBottom: 96 }}>
        {tab === "dash" && <Dashboard comp={comp} month={month} budgets={budgets} personView={personView} />}
        {tab === "entries" && (
          <Entries entries={entries} budgets={budgets} month={month} personView={personView}
            setEditing={setEditing} setEntries={setEntries} persistNow={persistNow} />
        )}
        {tab === "buy" && (
          <BuyAdvisor entries={entries} saldoInicial={saldoInicial} month={month} />
        )}
        {tab === "settings" && (
          <SettingsView budgets={budgets} setBudgets={setBudgets} month={month} entries={entries}
            saldoInicial={saldoInicial} setSaldoInicial={setSaldoInicial}
            comp={comp} onReset={async () => {
              const s = seedToState(SEED);
              setEntries(s.entries); setBudgets(s.budgets); setSaldoInicial(s.saldoInicial);
              await saveState(s); setSync(hasSupabase ? "ok" : "local");
              toast("Dados de 2026 restaurados", { tone: "success" });
            }} />
        )}
      </div>

      {/* FAB — escondido nos Ajustes e no Comprar? */}
      {tab !== "settings" && tab !== "buy" && (
        <button onClick={() => setEditing("new")} style={{
          position: "fixed", bottom: 80, right: 18, width: 58, height: 58, borderRadius: 18,
          background: C.orange, border: "none", color: "#fff", cursor: "pointer",
          boxShadow: "0 6px 18px rgba(232,115,42,.4)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 30,
        }}>
          <Plus size={28} strokeWidth={2.5} />
        </button>
      )}

      {/* Bottom nav */}
      <div style={{
        position: "fixed", bottom: 0, left: 0, right: 0, maxWidth: 480, margin: "0 auto",
        background: C.bg, borderTop: `1px solid ${C.line}`, display: "flex",
        padding: "8px 0 calc(8px + env(safe-area-inset-bottom))", zIndex: 25,
      }}>
        {[
          { id: "dash", icon: LayoutDashboard, label: "Painel" },
          { id: "entries", icon: ListPlus, label: "Lançamentos" },
          { id: "buy", icon: CircleDollarSign, label: "Comprar?" },
          { id: "settings", icon: Settings2, label: "Ajustes" },
        ].map(({ id, icon: Icon, label }) => {
          const active = tab === id;
          return (
          <button key={id} onClick={() => {
            if (id === "entries" && personView === "Casal") setPersonView("Fernando");
            setTab(id);
          }} style={{
            flex: 1, border: "none", background: "transparent", cursor: "pointer",
            display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            color: active ? C.couple : C.sub,
            transition: "color .18s ease",
          }}>
            <div style={{
              display: "flex", alignItems: "center", justifyContent: "center",
              width: 52, height: 30, borderRadius: 999,
              background: active ? C.coupleSoft : "transparent",
              transition: "background .18s ease",
            }}>
              <Icon size={22} strokeWidth={active ? 2.4 : 2} />
            </div>
            <span style={{ fontSize: 10.5, fontWeight: active ? 700 : 600 }}>{label}</span>
          </button>
          );
        })}
      </div>

      {editing && (
        <EntryModal editing={editing} month={month} existingNames={existingNames}
          defaultPerson={personView === "Casal" ? "Fernando" : personView}
          onClose={() => setEditing(null)} onSave={saveEntry} />
      )}
    </div>
  );
}

const root = {
  maxWidth: 480, margin: "0 auto", background: C.bg, minHeight: "100vh",
  color: C.ink, position: "relative",
};
const navArrow = (dis) => ({
  border: `1px solid ${C.line}`, background: C.bg, borderRadius: 9, width: 32, height: 32,
  display: "flex", alignItems: "center", justifyContent: "center", cursor: dis ? "default" : "pointer", flexShrink: 0,
});


try {
  const _root = ReactDOM.createRoot(document.getElementById("root"));
  _root.render(React.createElement(ToastProvider, null, React.createElement(App)));
} catch (err) {
  document.getElementById("root").innerHTML =
    '<div style="padding:24px;font-family:sans-serif;color:#142426">' +
    '<h3 style="color:#475569">Algo deu errado ao iniciar</h3>' +
    '<p style="color:#5E7173">Detalhe técnico: ' + (err && err.message ? err.message : err) + '</p>' +
    '</div>';
  console.error(err);
}

  </script>
</body>
</html>
